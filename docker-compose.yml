version: "3.8"

services:
  datadog-mcp:
    build: .
    container_name: datadog-mcp
    env_file: .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fL", "http://localhost:8080/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
